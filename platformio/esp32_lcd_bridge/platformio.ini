; ============================================================
;   ESP32 LCD Bridge — PlatformIO config
;   by amiteshsslv | github.com/amiteshsslv/esp32-lcd-bridge
; ============================================================

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Serial monitor speed (match Serial.begin in main.cpp)
monitor_speed = 115200

; Auto-reset before upload
monitor_rts = 0
monitor_dtr = 0

; Dependencies — PlatformIO fetches these automatically
lib_deps =
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4

; Optimise for size — the HTML page takes a chunk of flash
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -Os
